    <style>
        /* 基础样式 */
        :root {
            --primary-color: #ff3366;
            --secondary-color: #33ccff;
            --accent-color: #ffcc00;
            --dark-bg: #0a0a1a;
            --darker-bg: #050510;
            --light-text: #ffffff;
            --gray-text: #b0b0c0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--light-text);
            overflow-x: hidden;
        }

        /* 导航栏样式 */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background-color: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.3);
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav li {
            margin: 0 15px;
        }

        nav a {
            color: var(--light-text);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
        }

            nav a:hover {
                color: var(--secondary-color);
            }

            nav a::after {
                content: '';
                position: absolute;
                bottom: -5px;
                left: 0;
                width: 0;
                height: 2px;
                background: var(--secondary-color);
                transition: width 0.3s;
            }

            nav a:hover::after {
                width: 100%;
            }

        .language-selector {
            position: relative;
        }

        .language-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--light-text);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }

            .language-btn:hover {
                background: rgba(255, 255, 255, 0.2);
            }

        .language-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--darker-bg);
            border-radius: 10px;
            padding: 10px 0;
            width: 150px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s;
        }

        .language-selector:hover .language-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .language-option {
            padding: 8px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

            .language-option:hover {
                background: rgba(255, 255, 255, 0.1);
            }

        /* 主横幅区域 */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(rgba(18,18,18,0.9), rgba(18,18,18,0.5)), url('Images/Cover_Chem001.jpg') center/cover;
            /* background: linear-gradient(135deg, var(--darker-bg) 0%, var(--dark-bg) 100%), url('Images/2024042301i.jpg') center/cover;*/
        }

        .hero-content {
            text-align: center;
            z-index: 2;
            max-width: 800px;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(51, 204, 255, 0.3);
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }

            100% {
                transform: scale(1);
            }
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: var(--gray-text);
        }

        .cta-button {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(255, 51, 102, 0.3);
        }

            .cta-button:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 20px rgba(255, 51, 102, 0.4);
            }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.3;
        }

        .floating-element {
            position: absolute;
            border-radius: 50%;
            background: rgba(51, 204, 255, 0.1);
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
            }

            100% {
                transform: translateY(-1000px) rotate(720deg);
            }
        }

        /* 游戏展示区 */
        .games-section {
            padding: 100px 5%;
            background-color: var(--darker-bg);
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
            font-size: 2.5rem;
            position: relative;
        }

            .section-title::after {
                content: '';
                position: absolute;
                bottom: -10px;
                left: 50%;
                transform: translateX(-50%);
                width: 80px;
                height: 3px;
                background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

            .game-card:hover {
                transform: translateY(-10px);
                box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            }

        .game-image {
            height: 200px;
            background-color: #333;
            background-size: cover;
            background-position: center;
        }

        .game-content {
            padding: 20px;
        }

        .game-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--light-text);
        }

        .game-description {
            color: var(--gray-text);
            margin-bottom: 15px;
        }

        /* IP角色展示区 */
        .characters-section {
            padding: 100px 5%;
        }

        .character-slider {
            position: relative;
            overflow: hidden;
            height: 500px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .character-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s;
            display: flex;
            align-items: center;
            padding: 0 5%;
            background-size: cover;
            background-position: center;
        }

            .character-slide.active {
                opacity: 1;
            }

        .character-info {
            max-width: 500px;
            background: rgba(10, 10, 26, 0.8);
            padding: 30px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        .character-name {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--light-text);
        }

        .character-description {
            color: var(--gray-text);
            margin-bottom: 20px;
        }

        .slider-nav {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
        }

        .slider-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            margin: 0 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

            .slider-dot.active {
                background: var(--secondary-color);
            }

        /* 媒体内容区 */
        .media-section {
            padding: 100px 5%;
            background-color: var(--darker-bg);
        }

        .media-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .media-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
        }

            .media-item:hover {

            }

        .media-placeholder {
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-text);
        }

        .media-caption {
            padding: 15px;
            text-align: center;
            color: var(--light-text);
        }

        /* 关于我们内容区 */
        .about-section {
            padding: 100px 5%;
            background-color: var(--darker-bg);
        }

        .about-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .about-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .about-placeholder {
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;

        }

        .about-caption {
            padding: 15px;
            text-align: center;
            color: var(--light-text);
        }

        /* 联系我们内容区 */
        .contact-section {
            padding: 100px 5%;
            background-color: var(--darker-bg);
        }

        }

            text-align: center;
            color: var(--light-text);
        }

        /* 页脚 */

            background-color: var(--darker-bg);
            padding: 50px 5% 20px;

        }

        }

        /* 响应式设计 */

            header {
                flex-direction: column;

            }

            }

                }

            }

            .character-slide {
                flex-direction: column;
                justify-content: center;
            }

            .character-info {
                max-width: 100%;
            }
        }

                'contact-channel': 'Contacts',
                'contact-mail': 'Email: moa@biznetvigator.com',
                'contact-area': 'Area: Hong Kong, China',
                'footer-company': 'Company',
                'footer-about': 'About Us',
                'footer-careers': 'Careers',
                'footer-news': 'News',
                'footer-games': 'Games',
                'footer-support': 'Support',
                'footer-help': 'Help Center',
                'footer-contact': 'Contact Us',
                'footer-faq': 'FAQ',
                'footer-connect': 'Follow Us',
                'footer-twitter': 'Twitter',
                'footer-facebook': 'Facebook',
                'footer-instagram': 'Instagram',
                'footer-copyright': '© 2026 MOVEMENT OF ARTICULATION LIMITED All Rights Reserved'
            }
            // 其他语言可以在这里添加
        };

        // 当前语言
        let currentLang = 'zh-CN';

        // 语言切换功能
        document.querySelectorAll('.language-option').forEach(option => {
            option.addEventListener('click', function () {
                const lang = this.getAttribute('data-lang');
                if (translations[lang]) {
                    currentLang = lang;
                    updateLanguage();

                    // 更新当前语言显示
                    document.querySelector('.language-btn span').textContent =
                        translations[lang]['current-lang'];
                }
            });
        });

        // 更新页面语言
        function updateLanguage() {
            document.querySelectorAll('[data-lang-key]').forEach(element => {
                const key = element.getAttribute('data-lang-key');
                if (translations[currentLang] && translations[currentLang][key]) {
                    element.textContent = translations[currentLang][key];
                }
            });
        }

        // 角色轮播功能
        const slides = document.querySelectorAll('.character-slide');
        const dots = document.querySelectorAll('.slider-dot');
        let currentSlide = 0;

        function showSlide(n) {
            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));

            currentSlide = (n + slides.length) % slides.length;

            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
        }

        // 点击圆点切换幻灯片
        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                showSlide(index);
            });
        });

        // 自动轮播
        setInterval(() => {
            showSlide(currentSlide + 1);
        }, 5000);

        // 页面滚动效果
        window.addEventListener('scroll', function () {
            const header = document.querySelector('header');
            if (window.scrollY > 50) {
                header.style.padding = '10px 5%';
                header.style.boxShadow = '0 5px 15px rgba(0, 0, 0, 0.3)';
            } else {
                header.style.padding = '20px 5%';
                header.style.boxShadow = 'none';
            }
        });
    </script>
</body>
</html>
